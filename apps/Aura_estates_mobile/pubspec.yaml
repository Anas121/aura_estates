name: aura_estates
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Couche partagée (models, repositories, controllers, thème)
  aura_estates_core:
    path: ../../packages/aura_estates_core

  cupertino_icons: ^1.0.8
  firebase_core: ^4.9.0
  go_router: ^17.2.3
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  google_fonts: ^8.1.0
  image_picker: ^1.2.2

  hive_ce:
  hive_ce_flutter:
  flutter_slidable: ^4.0.3
  flutter_svg: ^2.3.0
  url_launcher: ^6.3.2
  cloud_firestore: ^6.6.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^4.0.3
  hive_ce_generator: ^1.11.0

flutter:
  assets:
    - assets/icons/
  uses-material-design: true
